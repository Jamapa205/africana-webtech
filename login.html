<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Africana</title>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link rel="stylesheet" href="style.css">
    <script src="cart.js"></script>
</head>
<body>
    <section id="header">
        <a href="index.html"><img src="img/logo.png" class="logo" alt="logo"></a>
        <div>
            <ul id="navbar">
                <li><a href="#" id="close"><i class="far fa-times"></i></a></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a class="active" href="login.html">Login</a></li>
                <li id="lg-bag"><a href="cart.html"><i class="fa fa-shopping-cart"></i> <span id="cart-count">0</span></a></li>
            </ul>
        </div>
        <div id="mobile">
            <a href="cart.html"><i class="fa fa-shopping-cart"></i></a>
            <i id="bar" class="fas fa-outdent"></i>
        </div>
    </section>

    <section style="min-height: 70vh; display: flex; align-items: center; justify-content: center; background: #f4f6f9; padding: 40px 20px;">
        <div style="background: #ffffff; width: 100%; max-width: 440px; padding: 40px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); border: 1px solid #e2e8f0;">
            <div style="text-align: center; margin-bottom: 30px;">
                <img src="img/logo.png" alt="Africana Logo" style="height: 45px; margin-bottom: 10px;">
                <h2 style="font-size: 24px; color: #0047AB; font-weight: 700;">Account Sign In</h2>
                <p style="color: #64748b; font-size: 14px; margin-top: 5px;">Enter your credentials to access your portal</p>
            </div>

            <form id="login-form">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #1e293b;">Username</label>
                    <input type="text" id="username" placeholder="e.g. jamapa" required style="width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px;">
                </div>

                <div style="margin-bottom: 25px;">
                    <label style="display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #1e293b;">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required style="width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px;">
                </div>

                <div id="login-error" style="color: #ef4444; font-size: 13px; font-weight: 600; margin-bottom: 15px; text-align: center;"></div>

                <button type="submit" style="width: 100%; background: #0047AB; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s;">
                    Sign In <i class="fas fa-arrow-right" style="margin-left: 6px;"></i>
                </button>
            </form>

            <div style="text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #e2e8f0; font-size: 14px; color: #64748b;">
                Don't have an account? <a href="register.html" style="color: #0047AB; font-weight: 700; text-decoration: none;">Create One</a>
            </div>
        </div>
    </section>

    <footer class="section-p1">
        <div class="col">
            <img class="logo" src="img/logo.png" alt="">
            <p><strong>Address:</strong> Jebel road, juba, South Sudan</p>
            <p><strong>Phone:</strong> +211 922 273 982</p>
        </div>
    </footer>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('login-error');
            errorEl.textContent = '';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    if (typeof showToast === 'function') {
                        showToast(`Welcome back, ${data.user.username}!`);
                    }

                    setTimeout(() => {
                        if (data.user.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'shop.html';
                        }
                    }, 600);
                } else {
                    errorEl.textContent = data.message || 'Login failed. Please check credentials.';
                }
            } catch (err) {
                errorEl.textContent = 'Server connection error. Please try again.';
            }
        });
    </script>
</body>
</html>
